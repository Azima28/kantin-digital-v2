<script>
        // Simple micro-interactions for buttons and cards
        document.querySelectorAll('button, .bg-white.rounded-2xl').forEach(el => {
            el.addEventListener('mousedown', () => el.style.transform = 'scale(0.98)');
            el.addEventListener('mouseup', () => el.style.transform = 'scale(1)');
            el.addEventListener('mouseleave', () => el.style.transform = 'scale(1)');
            el.addEventListener('touchstart', () => el.style.transform = 'scale(0.98)', {passive: true});
            el.addEventListener('touchend', () => el.style.transform = 'scale(1)');
        });
