<body class="font-body-md antialiased min-h-screen flex items-end justify-center">

    <!-- Modal Backdrop Overlay Mock -->
    <div class="fixed inset-0 bg-black/40 z-0"></div>

    <!-- Cupertino Style Bottom Sheet -->
    <div class="relative w-full max-w-md bg-white rounded-t-[32px] p-6 pb-10 shadow-2xl z-10 animate-slide-up flex flex-col gap-6">
        <!-- iOS Grab Handle -->
        <div class="w-12 h-1 bg-surface-container-highest rounded-full mx-auto mb-2"></div>

        <!-- Header -->
        <div class="text-center">
            <h1 class="font-title-md text-title-md text-on-surface">Detail Transaksi</h1>
        </div>

        <!-- Status Icon and Label -->
        <div class="flex flex-col items-center gap-2 my-2">
            <div class="w-14 h-14 rounded-full bg-tertiary-fixed text-on-tertiary-fixed-variant flex items-center justify-center">
                <span class="material-symbols-outlined text-3xl font-bold" style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
            <p class="font-title-md text-title-md text-tertiary">Transaksi Berhasil</p>
        </div>

        <!-- Metadata Rincian -->
        <div class="bg-background rounded-2xl p-4 flex flex-col gap-3">
            <div class="flex justify-between items-center text-sm">
                <span class="text-on-surface-variant font-medium">ID Transaksi</span>
                <span class="text-on-surface font-semibold">TX-2026061701</span>
            </div>
            <div class="flex justify-between items-center text-sm">
                <span class="text-on-surface-variant font-medium">Waktu Tap</span>
                <span class="text-on-surface font-semibold">17 Jun 2026, 12:02 WIB</span>
            </div>
            <div class="flex justify-between items-center text-sm">
                <span class="text-on-surface-variant font-medium">Lokasi Stan</span>
                <span class="text-on-surface font-semibold">Stan Bude Sari</span>
            </div>
        </div>

        <!-- Rincian Item Belanja -->
        <div class="flex flex-col gap-3">
            <h3 class="font-label-sm text-label-sm text-outline tracking-wider uppercase">RINCIAN ITEM BELANJA</h3>
            <div class="flex flex-col gap-2">
                <!-- Item 1 -->
                <div class="flex justify-between items-center">
                    <span class="text-on-surface font-medium text-body-md">1x Nasi Goreng</span>
                    <span class="text-on-surface font-semibold text-body-md">Rp 15.000</span>
                </div>
                <!-- Item 2 -->
                <div class="flex justify-between items-center">
                    <span class="text-on-surface font-medium text-body-md">1x Es Teh Manis</span>
                    <span class="text-on-surface font-semibold text-body-md">Rp 4.000</span>
                </div>
            </div>
            <div class="h-[1px] bg-surface-variant mt-2"></div>
        </div>

        <!-- Total & Sisa Saldo -->
        <div class="flex flex-col gap-3">
            <div class="flex justify-between items-center">
                <span class="text-on-surface font-bold text-body-lg">TOTAL NOMINAL</span>
                <span class="text-primary font-bold text-headline-lg-mobile">Rp 19.000</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-on-surface-variant text-sm font-medium">Sisa Saldo Saku Anak</span>
                <span class="text-secondary font-bold text-body-lg">Rp 75.000</span>
            </div>
        </div>

        <!-- Download Button -->
        <button class="w-full bg-primary-container text-on-primary py-4 rounded-2xl font-semibold text-label-md flex items-center justify-center gap-2 hover:bg-primary transition-colors mt-2 shadow-sm">
            <span class="material-symbols-outlined text-[20px]">download</span>
            UNDUH STRUK PDF

    </div>
