<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Midtrans Snap Checkout - Kantin Digital</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#005228",
                        "inverse-surface": "#303030",
                        "error": "#ba1a1a",
                        "secondary-fixed": "#ffdcc3",
                        "on-primary-fixed": "#002020",
                        "on-primary-container": "#f3fffe",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-lowest": "#ffffff",
                        "tertiary": "#006a35",
                        "primary-fixed": "#8ff3f2",
                        "tertiary-fixed-dim": "#61de8a",
                        "on-background": "#1b1c1c",
                        "secondary-fixed-dim": "#ffb77d",
                        "surface-container-high": "#eae8e7",
                        "on-tertiary": "#ffffff",
                        "background": "#fbf9f8",
                        "inverse-on-surface": "#f3f0f0",
                        "on-secondary": "#ffffff",
                        "outline": "#6d7979",
                        "on-secondary-fixed": "#2f1500",
                        "on-surface": "#1b1c1c",
                        "outline-variant": "#bdc9c8",
                        "secondary": "#904d00",
                        "surface-tint": "#006a6a",
                        "surface-variant": "#e4e2e1",
                        "surface": "#fbf9f8",
                        "on-tertiary-container": "#f6fff4",
                        "on-secondary-fixed-variant": "#6e3900",
                        "inverse-primary": "#72d6d6",
                        "surface-container-highest": "#e4e2e1",
                        "tertiary-container": "#008645",
                        "surface-dim": "#dcd9d9",
                        "primary-fixed-dim": "#72d6d6",
                        "on-secondary-container": "#713b00",
                        "on-surface-variant": "#3d4949",
                        "on-error": "#ffffff",
                        "secondary-container": "#ffa454",
                        "primary": "#006767",
                        "surface-container": "#f0eded",
                        "tertiary-fixed": "#7efba4",
                        "primary-container": "#008282",
                        "surface-bright": "#fbf9f8",
                        "on-primary-fixed-variant": "#004f50",
                        "on-tertiary-fixed": "#00210c",
                        "surface-container-low": "#f6f3f2",
                        "error-container": "#ffdad6"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "container-max": "1200px",
                        "xl": "40px",
                        "lg": "24px",
                        "md": "16px",
                        "sm": "8px",
                        "xs": "4px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "headline-xl": ["Be Vietnam Pro"],
                        "headline-lg-mobile": ["Be Vietnam Pro"],
                        "headline-md": ["Be Vietnam Pro"],
                        "headline-lg": ["Be Vietnam Pro"],
                        "label-md": ["Be Vietnam Pro"],
                        "body-lg": ["Be Vietnam Pro"],
                        "button": ["Be Vietnam Pro"],
                        "body-md": ["Be Vietnam Pro"],
                        "title-md": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "headline-xl": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-lg-mobile": ["28px", { "lineHeight": "34px", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "26px", "fontWeight": "400" }],
                        "button": ["14px", { "lineHeight": "20px", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "22px", "fontWeight": "400" }],
                        "title-md": ["18px", { "lineHeight": "24px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background min-h-screen text-on-background antialiased relative">
<!-- Top Navigation Bar (Background Context) -->
<header class="bg-background border-b border-surface-variant flex justify-between items-center h-16 px-lg max-w-container-max mx-auto w-full">
<div class="font-headline-md text-headline-md text-primary">Kantin Digital</div>
<nav class="hidden md:flex gap-lg">
<a class="font-body-md text-body-md font-button text-button text-on-surface-variant hover:text-primary transition-colors cursor-pointer" href="#">Dashboard</a>
<a class="font-body-md text-body-md font-button text-button text-primary border-b-2 border-primary pb-1 cursor-pointer" href="#">Top-up</a>
<a class="font-body-md text-body-md font-button text-button text-on-surface-variant hover:text-primary transition-colors cursor-pointer" href="#">History</a>
</nav>
<div class="flex gap-md items-center">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer">notifications</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer">account_circle</span>
</div>
</header>
<!-- Background Content (Simulated Top-up Screen) -->
<main class="max-w-container-max mx-auto px-lg py-xl">
<div class="max-w-md mx-auto bg-surface-container-lowest p-lg rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant">
<h1 class="font-headline-lg text-headline-lg mb-lg">Top-up Balance</h1>
<div class="mb-md">
<label class="font-label-md text-label-md text-on-surface-variant mb-xs block">Amount to Top-up</label>
<div class="relative">
<span class="absolute left-md top-1/2 -translate-y-1/2 font-title-md text-title-md">Rp</span>
<input class="w-full pl-[48px] pr-md py-sm border border-outline-variant rounded bg-surface-container-low font-title-md text-title-md text-on-surface" disabled="" type="text" value="100.000">
</div>
</div>
<button class="w-full bg-secondary-container text-on-secondary-container font-button text-button py-sm rounded mt-md opacity-50" disabled="">Proceed to Payment</button>
</div>
</main>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 bg-[#000000] bg-opacity-60 z-40 flex items-center justify-center p-md lg:p-xl backdrop-blur-md" id="modalBackdrop">
<!-- Midtrans Snap Modal -->
<div aria-modal="true" class="bg-surface-container-lowest w-full max-w-[900px] h-[90vh] lg:h-[80vh] rounded-2xl shadow-[0px_16px_40px_rgba(0,0,0,0.2)] flex flex-col relative z-50 animate-[slideUp_0.3s_ease-out]" role="dialog">
<!-- Modal Header -->
<div class="flex justify-between items-center p-md lg:p-lg border-b border-surface-variant bg-surface-container-low rounded-t-2xl">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">security</span>
<h2 class="font-title-md text-title-md text-on-surface tracking-tight">MIDTRANS SNAP</h2>
</div>
<button aria-label="Close" class="text-on-surface-variant hover:text-on-surface transition-colors p-sm rounded-full hover:bg-surface-variant">
<span class="material-symbols-outlined">close</span>
</button>
</div>
<!-- Modal Content -->
<div class="p-md lg:p-xl flex-1 overflow-y-auto flex flex-col md:flex-row gap-lg lg:gap-xl">
<!-- Bill Summary -->
<div class="w-full md:w-1/3 flex flex-col">
<div class="text-center bg-surface p-xl rounded-xl border border-surface-variant flex-1 flex flex-col justify-center">
<p class="font-label-md text-label-md text-on-surface-variant mb-sm">Total Tagihan</p>
<p class="font-headline-lg-mobile text-headline-lg text-primary mb-md">Rp 100.000</p>
<div class="h-px w-full bg-surface-variant my-md"></div>
<p class="font-body-md text-body-md text-on-surface-variant">Order ID</p>
<p class="font-title-md text-title-md text-on-surface mt-xs">#KD-982734</p>
</div>
</div>
<!-- Payment Methods List -->
<div class="w-full md:w-2/3 flex flex-col">
<p class="font-title-md text-title-md mb-md lg:mb-lg">Pilih Metode Pembayaran</p>
<div class="grid grid-cols-1 sm:grid-cols-2 gap-md">
<!-- QRIS -->
<label class="flex items-center p-md border border-surface-variant rounded-xl cursor-pointer hover:bg-surface-container-low hover:border-primary transition-colors group relative">
<input checked="" class="sr-only peer" name="payment_method" type="radio">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center mr-md shrink-0">
<span class="material-symbols-outlined text-primary">qr_code_scanner</span>
</div>
<div class="flex-1">
<p class="font-title-md text-title-md">QRIS</p>
<p class="font-body-md text-label-md text-on-surface-variant mt-xs">Gopay, ShopeePay, Dana</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center relative shrink-0">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</label>
<!-- Virtual Account BCA -->
<label class="flex items-center p-md border border-surface-variant rounded-xl cursor-pointer hover:bg-surface-container-low hover:border-primary transition-colors group relative">
<input class="sr-only peer" name="payment_method" type="radio">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center mr-md shrink-0">
<span class="material-symbols-outlined text-primary">account_balance</span>
</div>
<div class="flex-1">
<p class="font-title-md text-title-md">BCA Virtual Account</p>
<p class="font-body-md text-label-md text-on-surface-variant mt-xs">Transfer dari BCA</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center relative shrink-0">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</label>
<!-- Virtual Account Mandiri -->
<label class="flex items-center p-md border border-surface-variant rounded-xl cursor-pointer hover:bg-surface-container-low hover:border-primary transition-colors group relative">
<input class="sr-only peer" name="payment_method" type="radio">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center mr-md shrink-0">
<span class="material-symbols-outlined text-primary">account_balance</span>
</div>
<div class="flex-1">
<p class="font-title-md text-title-md">Mandiri Virtual Account</p>
<p class="font-body-md text-label-md text-on-surface-variant mt-xs">Transfer dari Livin'</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center relative shrink-0">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</label>
<!-- Minimarket -->
<label class="flex items-center p-md border border-surface-variant rounded-xl cursor-pointer hover:bg-surface-container-low hover:border-primary transition-colors group relative">
<input class="sr-only peer" name="payment_method" type="radio">
<div class="w-12 h-12 bg-surface-container rounded-lg flex items-center justify-center mr-md shrink-0">
<span class="material-symbols-outlined text-primary">storefront</span>
</div>
<div class="flex-1">
<p class="font-title-md text-title-md">Alfamart / Indomaret</p>
<p class="font-body-md text-label-md text-on-surface-variant mt-xs">Bayar di kasir</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center relative shrink-0">
<div class="w-2.5 h-2.5 rounded-full bg-on-primary opacity-0 peer-checked:opacity-100 transition-opacity"></div>
</div>
</label>
</div>
</div>
</div>
<!-- Modal Footer -->
<div class="p-md lg:p-lg border-t border-surface-variant bg-surface-container-lowest rounded-b-2xl">
<div class="max-w-[400px] mx-auto">
<button class="w-full bg-primary text-on-primary font-button text-button py-md rounded-xl shadow-[0px_4px_20px_rgba(0,0,0,0.1)] hover:bg-primary-container hover:text-on-primary-container transition-all flex items-center justify-center gap-sm">
<span>LANJUTKAN PEMBAYARAN</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<div class="mt-md text-center flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[14px] text-on-surface-variant">lock</span>
<span class="font-label-md text-label-md text-on-surface-variant">Pembayaran Aman via Midtrans</span>
</div>
</div>
</div>
</div>
</div>
<style>
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</body></html>
