<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center font-body-md antialiased p-container-padding safe-area-pt safe-area-pb">
<main class="w-full max-w-md flex flex-col items-center flex-grow justify-center gap-section-margin">
<!-- Header / Logo Area -->
<header class="flex flex-col items-center text-center space-y-4">
<div class="w-20 h-20 bg-primary-container rounded-3xl flex items-center justify-center text-on-primary-container shadow-sm mb-2">
<span class="material-symbols-outlined text-[40px]" style="font-variation-settings: 'FILL' 1;">contactless</span>
</div>
<div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight mb-1">KANTIN DIGITAL</h1>
<h2 class="font-title-md text-title-md text-on-surface-variant">Portal Orang Tua Siswa</h2>
</div>
<p class="font-body-md text-body-md text-outline max-w-[280px]">
                Pantau Jajanan &amp; Saldo Anak Secara Real-Time &amp; Praktis
            </p>
</header>
<!-- Login Form Bento Card -->
<div class="w-full bg-surface-container-lowest rounded-[24px] p-[20px] bento-card border border-surface-container-high/50">
<form action="#" class="space-y-6" method="POST">
<!-- Input Field -->
<div class="space-y-2">
<label class="block font-label-sm text-label-sm text-on-surface-variant ml-1" for="nisn">
                        NIS / Kode Unik Siswa
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline-variant">badge</span>
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 pl-12 pr-4 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest transition-colors" id="nisn" name="nisn" placeholder="Masukkan NIS anak..." required="" type="number"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full bg-primary-container text-on-primary py-4 rounded-xl font-label-md text-label-md tracking-wider uppercase flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
<span class="material-symbols-outlined text-[20px]">search</span>
                    CEK SALDO &amp; AKTIVITAS ANAK
                </button>
</form>
</div>
</main>

<footer class="mt-auto pt-8 pb-4 text-center">
