<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Kantin Digital - Splash Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-highest": "#e2e2e7",
                        "on-primary-fixed-variant": "#004f50",
                        "surface": "#f9f9fe",
                        "on-tertiary-fixed": "#410001",
                        "primary-fixed-dim": "#72d6d6",
                        "surface-tint": "#006a6a",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#ffb874",
                        "secondary": "#8c5000",
                        "on-tertiary-fixed-variant": "#930005",
                        "tertiary-container": "#e2241f",
                        "surface-bright": "#f9f9fe",
                        "on-primary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-surface": "#1a1c1f",
                        "error-container": "#ffdad6",
                        "secondary-container": "#fe9400",
                        "on-primary-container": "#f3fffe",
                        "on-error": "#ffffff",
                        "primary-container": "#008282",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed": "#8ff3f2",
                        "on-surface-variant": "#3d4949",
                        "on-secondary-fixed": "#2d1600",
                        "surface-dim": "#d9dade",
                        "primary": "#006767",
                        "surface-variant": "#e2e2e7",
                        "tertiary-fixed": "#ffdad5",
                        "on-tertiary-container": "#fffbff",
                        "on-secondary-fixed-variant": "#6a3b00",
                        "on-secondary-container": "#633700",
                        "inverse-surface": "#2e3034",
                        "surface-container-low": "#f3f3f8",
                        "surface-container": "#ededf2",
                        "outline-variant": "#bdc9c8",
                        "inverse-primary": "#72d6d6",
                        "secondary-fixed": "#ffdcbf",
                        "tertiary": "#bc000a",
                        "surface-container-high": "#e8e8ed",
                        "outline": "#6d7979",
                        "inverse-on-surface": "#f0f0f5",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#ffb4aa",
                        "background": "#F2F2F7",
                        "on-background": "#1a1c1f",
                        "on-primary-fixed": "#002020",
                        "error": "#ba1a1a"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap-md": "16px",
                        "gutter-grid": "12px",
                        "touch-target-min": "44px",
                        "margin-main": "16px",
                        "stack-gap-sm": "8px"
                    },
                    "fontFamily": {
                        "nav-title-lg": ["Inter"],
                        "price-display": ["Inter"],
                        "body-semibold": ["Inter"],
                        "headline-md": ["Inter"],
                        "label-caps": ["Inter"],
                        "body-main": ["Inter"],
                        "nav-title-mobile": ["Inter"]
                    },
                    "fontSize": {
                        "nav-title-lg": ["34px", { "lineHeight": "41px", "letterSpacing": "-0.4px", "fontWeight": "700" }],
                        "price-display": ["22px", { "lineHeight": "28px", "fontWeight": "700" }],
                        "body-semibold": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.4px", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "25px", "letterSpacing": "-0.2px", "fontWeight": "600" }],
                        "label-caps": ["13px", { "lineHeight": "18px", "letterSpacing": "0.1px", "fontWeight": "500" }],
                        "body-main": ["17px", { "lineHeight": "22px", "letterSpacing": "-0.4px", "fontWeight": "400" }],
                        "nav-title-mobile": ["24px", { "lineHeight": "30px", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .pulse-wave {
            animation: pulseWave 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes pulseWave {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#F2F2F7] text-on-background min-h-screen flex flex-col items-center justify-center font-body-main antialiased overflow-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Main Content Canvas -->
<main class="flex flex-col items-center justify-center w-full max-w-md px-margin-main z-10 relative">
<!-- Decorative Background Element (Subtle Tonal Shift) -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none -z-10">
<div class="w-64 h-64 bg-primary/5 rounded-full blur-3xl mix-blend-multiply"></div>
</div>
<!-- Logo / Icon Cluster -->
<div class="fade-in-up flex flex-col items-center mb-stack-gap-md relative">
<!-- Main Plate Icon -->
<div class="w-32 h-32 bg-[#ffffff] rounded-full flex items-center justify-center shadow-sm border border-outline-variant mb-6 relative">
<!-- NFC Waves abstract representation -->
<div class="absolute -top-1 -right-1 pulse-wave text-[#0E8A8A]">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">contactless</span>
</div>
<span class="material-symbols-outlined text-6xl text-[#0E8A8A]" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
</div>
<!-- Typography -->
<div class="text-center fade-in-up delay-100 max-w-xs space-y-2 mb-10">
<h1 class="font-nav-title-lg text-nav-title-lg text-[#0E8A8A]">Kantin Digital</h1>
<p class="font-body-main text-body-main text-on-surface-variant">Mulai Jajan Praktis, Tanpa Uang Tunai Lagi.</p>
</div>
<!-- Bottom Action Area -->
<div class="w-full fade-in-up delay-300">
<button class="w-full h-[50px] bg-[#0E8A8A] text-[#ffffff] font-body-semibold text-body-semibold rounded-[14px] flex items-center justify-center hover:opacity-80 transition-opacity active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-[#0E8A8A] focus:ring-offset-2 focus:ring-offset-[#F2F2F7] shadow-sm border border-transparent">
            Mulai Sekarang
        </button>
</div>
</main>
</body></html>
