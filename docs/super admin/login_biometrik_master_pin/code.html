<script>
        let pinCount = 0;
        const maxPin = 6;
        const indicators = document.querySelectorAll('.pin-dot');

        function enterPin(num) {
            if (pinCount < maxPin) {
                indicators[pinCount].classList.add('filled');
                indicators[pinCount].classList.remove('bg-surface-variant', 'border-outline-variant');
                pinCount++;
                
                if (pinCount === maxPin) {
                    // Simulate verification
                    setTimeout(() => {
                        // Reset for demo purposes
                        resetPin();
                    }, 500);
                }
            }
        }

        function deletePin() {
            if (pinCount > 0) {
                pinCount--;
                indicators[pinCount].classList.remove('filled');
                indicators[pinCount].classList.add('bg-surface-variant', 'border-outline-variant');
            }
        }

        function resetPin() {
            pinCount = 0;
            indicators.forEach(indicator => {
                indicator.classList.remove('filled');
                indicator.classList.add('bg-surface-variant', 'border-outline-variant');
            });
        }
    </script>
