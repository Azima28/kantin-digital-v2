name: kantin_digital
description: "Sistem Kantin Digital - RFID/NFC based digital canteen system"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.1
  nfc_manager: ^3.3.0
  google_fonts: ^6.2.1
  intl: ^0.19.0
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
